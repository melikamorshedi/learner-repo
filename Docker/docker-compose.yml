version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres

    restart: always

    environment:
      POSTGRES_USER: gitea
      POSTGRES_PASSWORD: gitea123
      POSTGRES_DB: gitea

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    networks:
      - gitea-network


  gitea:
    image: gitea/gitea:latest
    container_name: gitea

    restart: always

    depends_on:
      - postgres

    environment:
      USER_UID: 1000
      USER_GID: 1000

      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: gitea123

    volumes:
      - ./data/gitea:/data

    ports:
      - "3000:3000"
      - "2222:22"

    networks:
      - gitea-network


networks:
  gitea-network: